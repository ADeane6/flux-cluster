apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: esphome
  namespace: default
spec:
  interval: 5m
  chart:
    spec:
      chart: app-template
      version: 3.7.3
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      main:
        annotations:
          reloader.stakater.com/reload: "esphome-config"
        pod:
          hostNetwork: true
        initContainers:
          git-clone:
            image:
              repository: alpine/git
              tag: latest
            command:
              - /bin/sh
              - -c
              - |
                if [ ! -d /config/.git ]; then
                  git clone git@github.com:ADeane6/esphome_config.git /tmp/repo
                  cp -a /tmp/repo/. /config/
                else
                  cd /config
                  git stash || true
                  git pull --ff-only || true
                  git stash pop || true
                fi
            env:
              - name: GIT_SSH_COMMAND
                value: "ssh -i /etc/git-secret/ssh-key -o StrictHostKeyChecking=no"
        containers:
          app:
            image:
              repository: esphome/esphome
              tag: latest
            env:
              TZ: "${TIMEZONE}"
            securityContext:
              privileged: true
          git-sync:
            image:
              repository: alpine/git
              tag: latest
            command:
              - /bin/sh
              - -c
              - |
                cd /config
                git config user.name "ESPHome Dashboard"
                git config user.email "esphome@tomnuc.home"
                while true; do
                  sleep 300
                  git add -A
                  git diff --cached --quiet || git commit -m "auto: dashboard config update"
                  git pull --rebase || true
                  git push || true
                done
            env:
              - name: GIT_SSH_COMMAND
                value: "ssh -i /etc/git-secret/ssh-key -o StrictHostKeyChecking=no"
    service:
      app:
        controller: main
        ports:
          http:
            port: 6052
    ingress:
      main:
        enabled: true
        className: "nginx"
        annotations:
          cert-manager.io/cluster-issuer: "letsencrypt-production"
          hajimari.io/enable: "true"
          hajimari.io/icon: "eos-icons:home"
          hajimari.io/appName: ESPHome
        hosts:
          - host: &host "esphome.${SECRET_DOMAIN}"
            paths:
              - path: /
                service:
                  identifier: app
                  port: http
        tls:
          - hosts:
              - *host
            secretName: "esphome-tls"
    persistence:
      config:
        enabled: true
        existingClaim: esphome-config
        globalMounts:
          - path: /config
      secrets:
        type: secret
        name: esphome-secrets
        advancedMounts:
          main:
            app:
              - path: /config/secrets.yaml
                subPath: secrets.yaml
      git-ssh:
        type: secret
        name: esphome-git-ssh
        defaultMode: 0400
        advancedMounts:
          main:
            git-clone:
              - path: /etc/git-secret
                readOnly: true
            git-sync:
              - path: /etc/git-secret
                readOnly: true

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus
  namespace: monitoring
spec:
  interval: 15m
  chart:
    spec:
      chart: prometheus
      version: 29.6.0
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 5
  upgrade:
    remediation:
      retries: 5
  values:
    alertmanager:
      enabled: false
    prometheus-pushgateway:
      enabled: false
    kube-state-metrics:
      enabled: false
    prometheus-node-exporter:
      enabled: false
    server:
      retention: 30d
      persistentVolume:
        enabled: true
        size: 20Gi
        storageClass: local-path
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 512Mi
    extraScrapeConfigs: |
      - job_name: truenas-graphite
        honor_labels: true
        static_configs:
          - targets:
              - graphite-exporter.monitoring.svc.cluster.local:9108
        scrape_interval: 30s
      - job_name: netdata
        metrics_path: /api/v1/allmetrics
        params:
          format: [prometheus]
        honor_labels: true
        static_configs:
          - targets:
              - netdata.monitoring.svc.cluster.local:19999
        scrape_interval: 30s

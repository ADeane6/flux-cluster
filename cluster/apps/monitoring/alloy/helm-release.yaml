---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alloy
  namespace: monitoring
spec:
  interval: 15m
  chart:
    spec:
      chart: alloy
      version: 1.8.1
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 5
  upgrade:
    remediation:
      retries: 5
  values:
    alloy:
      configMap:
        create: false
        name: alloy-config
        key: config.alloy
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          memory: 256Mi
      extraPorts:
        - name: syslog-udp
          port: 514
          targetPort: 514
          protocol: UDP
        - name: syslog-tcp
          port: 1514
          targetPort: 1514
          protocol: TCP
    controller:
      type: daemonset
    service:
      enabled: true
      type: LoadBalancer
      annotations:
        metallb.universe.tf/loadBalancerIPs: "${SYSLOG_LB}"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
  namespace: monitoring
data:
  config.alloy: |
    // Discover and collect all k8s pod logs
    discovery.kubernetes "pods" {
      role = "pod"
    }

    discovery.relabel "pods" {
      targets = discovery.kubernetes.pods.targets

      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        target_label  = "namespace"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_name"]
        target_label  = "pod"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_container_name"]
        target_label  = "container"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
        target_label  = "app"
      }
    }

    loki.source.kubernetes "pods" {
      targets    = discovery.relabel.pods.output
      forward_to = [loki.write.default.receiver]
    }

    // Syslog listener for external devices
    loki.source.syslog "external" {
      listener {
        address       = "0.0.0.0:514"
        protocol      = "udp"
        syslog_format = "rfc3164"
        labels        = { source = "syslog" }
      }
      listener {
        address       = "0.0.0.0:1514"
        protocol      = "tcp"
        syslog_format = "rfc3164"
        labels        = { source = "syslog" }
      }
      forward_to = [loki.relabel.syslog.receiver]
    }

    // Relabel syslog to extract device info
    // Use labelmap to promote all __syslog_ internal labels
    loki.relabel "syslog" {
      forward_to = [loki.write.default.receiver]

      rule {
        action       = "labelmap"
        regex        = "__syslog_message_(.*)"
      }
      rule {
        action       = "labelmap"
        regex        = "__syslog_connection_(.*)"
        replacement  = "connection_$1"
      }
    }

    // Write to Loki
    loki.write "default" {
      endpoint {
        url = "http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push"
      }
    }

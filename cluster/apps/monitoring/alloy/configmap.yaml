---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
  namespace: monitoring
data:
  config.alloy: |
    // Discover and collect all k8s pod logs
    discovery.kubernetes "pods" {
      role = "pod"
    }

    discovery.relabel "pods" {
      targets = discovery.kubernetes.pods.targets

      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        target_label  = "namespace"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_name"]
        target_label  = "pod"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_container_name"]
        target_label  = "container"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
        target_label  = "app"
      }
    }

    loki.source.kubernetes "pods" {
      targets    = discovery.relabel.pods.output
      forward_to = [loki.write.default.receiver]
    }

    // Syslog listener for external devices
    // Using RFC 5424 format - devices that send RFC 3164 will have
    // their messages parsed with best-effort field extraction
    loki.source.syslog "external" {
      listener {
        address              = "0.0.0.0:514"
        protocol             = "udp"
        labels               = { source = "syslog" }
        use_rfc5424_message  = true
      }
      listener {
        address              = "0.0.0.0:1514"
        protocol             = "tcp"
        labels               = { source = "syslog" }
        use_rfc5424_message  = true
      }
      forward_to = [loki.relabel.syslog.receiver]
    }

    // Relabel syslog to extract device info
    loki.relabel "syslog" {
      forward_to = [loki.write.default.receiver]

      rule {
        source_labels = ["__syslog_message_hostname"]
        target_label  = "device"
      }
      rule {
        source_labels = ["__syslog_connection_hostname"]
        target_label  = "device_ip"
      }
      rule {
        source_labels = ["__syslog_message_app_name"]
        target_label  = "app"
      }
      rule {
        source_labels = ["__syslog_message_severity"]
        target_label  = "severity"
      }
      rule {
        source_labels = ["__syslog_message_facility"]
        target_label  = "facility"
      }
    }

    // Write to Loki
    loki.write "default" {
      endpoint {
        url = "http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push"
      }
    }

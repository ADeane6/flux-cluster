---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
  namespace: monitoring
data:
  config.alloy: |
    // Discover and collect all k8s pod logs
    discovery.kubernetes "pods" {
      role = "pod"
    }

    discovery.relabel "pods" {
      targets = discovery.kubernetes.pods.targets

      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        target_label  = "namespace"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_name"]
        target_label  = "pod"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_container_name"]
        target_label  = "container"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
        target_label  = "app"
      }
    }

    loki.source.kubernetes "pods" {
      targets    = discovery.relabel.pods.output
      forward_to = [loki.write.default.receiver]
    }

    // Relabel rules to promote __syslog_ internal labels
    // These rules run INSIDE loki.source.syslog before labels are stripped
    loki.relabel "syslog_labels" {
      forward_to = []

      rule {
        source_labels = ["__syslog_message_hostname"]
        target_label  = "device"
      }
      rule {
        source_labels = ["__syslog_connection_ip_address"]
        target_label  = "device_ip"
      }
      rule {
        source_labels = ["__syslog_message_app_name"]
        target_label  = "app"
      }
      rule {
        source_labels = ["__syslog_message_severity"]
        target_label  = "severity"
      }
      rule {
        source_labels = ["__syslog_message_facility"]
        target_label  = "facility"
      }
    }

    // Syslog listener for external devices (all RFC 3164)
    loki.source.syslog "external" {
      listener {
        address       = "0.0.0.0:514"
        protocol      = "udp"
        syslog_format = "rfc3164"
        labels        = { source = "syslog" }
      }
      listener {
        address       = "0.0.0.0:1514"
        protocol      = "tcp"
        syslog_format = "rfc3164"
        labels        = { source = "syslog" }
      }
      relabel_rules = loki.relabel.syslog_labels.rules
      forward_to    = [loki.write.default.receiver]
    }

    // Host journal logs (kernel, systemd, dmesg)
    loki.relabel "journal_labels" {
      forward_to = []

      rule {
        source_labels = ["__journal__systemd_unit"]
        target_label  = "unit"
      }
      rule {
        source_labels = ["__journal__transport"]
        target_label  = "transport"
      }
      rule {
        source_labels = ["__journal_priority_keyword"]
        target_label  = "level"
      }
      rule {
        source_labels = ["__journal__hostname"]
        target_label  = "host"
      }
    }

    loki.source.journal "host" {
      path          = "/var/log/journal"
      labels        = { source = "journal" }
      relabel_rules = loki.relabel.journal_labels.rules
      forward_to    = [loki.write.default.receiver]
    }

    // Write to Loki
    loki.write "default" {
      endpoint {
        url = "http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push"
      }
    }

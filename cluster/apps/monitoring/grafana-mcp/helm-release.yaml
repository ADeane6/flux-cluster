---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana-mcp
  namespace: monitoring
spec:
  interval: 15m
  chart:
    spec:
      chart: grafana-mcp
      version: 0.15.0
      sourceRef:
        kind: HelmRepository
        name: grafana-community
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 5
  upgrade:
    remediation:
      retries: 5
  values:
    grafana:
      url: "http://grafana.monitoring.svc.cluster.local:80"
      apiKeySecret:
        name: grafana-mcp-token
        key: api-key

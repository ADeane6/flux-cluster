---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: netdata
  namespace: monitoring
spec:
  interval: 15m
  chart:
    spec:
      chart: netdata
      version: 3.7.163
      sourceRef:
        kind: HelmRepository
        name: netdata
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 5
  upgrade:
    remediation:
      retries: 5
  values:
    service:
      type: ClusterIP
      port: 19999
    ingress:
      enabled: true
      annotations:
        cert-manager.io/cluster-issuer: "letsencrypt-production"
      path: /
      pathType: Prefix
      hosts:
        - "netdata.${SECRET_DOMAIN}"
      tls:
        - secretName: netdata-tls
          hosts:
            - "netdata.${SECRET_DOMAIN}"
    parent:
      enabled: true
      port: 19999
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 512Mi
      persistence:
        enabled: true
        existingClaim: netdata-data
      configs:
        netdata:
          enabled: true
          path: /etc/netdata/netdata.conf
          data: |
            [global]
              hostname = netdata-parent
            [cloud]
              enabled = no
            [db]
              mode = dbengine
            [plugins]
              cgroups = no
              tc = no
              enable running new plugins = no
              check for new plugins every = 72000
              python.d = no
              charts.d = no
              go.d = yes
              node.d = no
              apps = no
              proc = no
              idlejitter = no
              diskspace = no
        go.d:
          enabled: true
          path: /etc/netdata/go.d.conf
          data: |
            modules:
              snmp: yes
        go.d-snmp:
          enabled: true
          path: /etc/netdata/go.d/snmp.conf
          data: |
            jobs:
              - name: netgear-gs724t
                hostname: 10.0.3.253
                community: public
                version: 2
                update_every: 30
              - name: unifi-ucg-ultra
                hostname: 10.0.3.254
                community: public
                version: 2
                update_every: 30
    child:
      enabled: true
      resources:
        requests:
          cpu: 50m
          memory: 256Mi
        limits:
          memory: 512Mi
